<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Балетная академия Эльзы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F0F4FF;
  --accent: #A78BFA;
  --correct: #6EE7B7;
  --error: #FCA5A5;
  --card: #FFFFFF;
  --text: #1E1B4B;
  --text2: #6B7280;
  --border: #E0E7FF;
  --streak: #FCD34D;
  --radius-lg: 16px;
  --radius-md: 12px;
  --shadow: 0 2px 8px rgba(167,139,250,0.15);
  --font: 'Nunito', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
#app {
  max-width: 500px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}
.screen {
  display: none;
  min-height: 100vh;
  padding: 20px 16px;
  flex-direction: column;
  align-items: center;
  animation: fadeIn 0.3s ease;
}
.screen.active { display: flex; }

/* ===== START SCREEN ===== */
#screen-start {
  justify-content: center;
  background: linear-gradient(135deg, #E0E7FF, #F5F3FF);
  text-align: center;
  gap: 24px;
}
.start-logo { margin-bottom: 8px; }
.start-logo svg { width: 200px; height: auto; }
.start-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
  margin-top: 8px;
}
.start-subtitle {
  font-size: 15px;
  color: var(--text2);
  margin-top: 4px;
}
.start-characters {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin: 16px 0;
}
.start-characters svg { width: 60px; height: 60px; }
.btn {
  border: none;
  border-radius: var(--radius-md);
  font-family: var(--font);
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s ease, background-color 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--accent);
  color: #fff;
  font-size: 18px;
  padding: 14px 48px;
  box-shadow: var(--shadow);
}
.btn-primary:hover { background: #9775E8; }
.btn-small {
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  padding: 8px 16px;
  text-decoration: underline;
  cursor: pointer;
  border: none;
  font-family: var(--font);
}
.btn-ghost {
  background: transparent;
  color: var(--text2);
  font-size: 14px;
  padding: 8px 16px;
}
.reset-btn {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

/* ===== MAP SCREEN ===== */
#screen-map { gap: 20px; padding-top: 40px; }
.map-header {
  display: flex;
  justify-content: space-between;
  width: 100%;
  align-items: center;
}
.map-score {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
}
.map-streak {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 16px;
  font-weight: 700;
  color: #F59E0B;
}
.map-collection-btn {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius-md);
  padding: 8px 16px;
  font-family: var(--font);
  font-weight: 600;
  font-size: 14px;
  color: var(--accent);
  cursor: pointer;
}
.map-levels {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  width: 100%;
  margin: 20px 0;
}
.map-level-line { width: 3px; height: 30px; background: var(--border); }
.map-level-line.completed { background: var(--correct); }
.map-level-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  width: 85%;
  max-width: 360px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
  text-align: center;
}
.map-level-card:active { transform: scale(0.98); }
.map-level-card.current {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(167,139,250,0.25), var(--shadow);
  animation: pulse 2s infinite;
}
.map-level-card.locked {
  opacity: 0.5;
  cursor: default;
  pointer-events: none;
}
.map-level-card.completed { border-color: var(--correct); }
.map-level-name {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 4px;
}
.map-level-sub {
  font-size: 13px;
  color: var(--text2);
}
.map-level-icon {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
}
.map-costume-progress {
  width: 85%;
  max-width: 360px;
  background: var(--card);
  border-radius: var(--radius-lg);
  padding: 16px;
  box-shadow: var(--shadow);
}
.costume-progress-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 8px;
}
.costume-progress-bar {
  width: 100%;
  height: 10px;
  background: var(--border);
  border-radius: 5px;
  overflow: hidden;
}
.costume-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #C4B5FD);
  border-radius: 5px;
  transition: width 0.5s ease;
}
.map-error-review {
  background: var(--card);
  border: 2px solid var(--error);
  border-radius: var(--radius-lg);
  padding: 14px 20px;
  width: 85%;
  max-width: 360px;
  cursor: pointer;
  font-family: var(--font);
  font-weight: 600;
  font-size: 15px;
  color: var(--text);
  text-align: center;
  box-shadow: var(--shadow);
}
.map-error-review:active { transform: scale(0.97); }

/* ===== TASK SCREEN ===== */
#screen-task { padding: 16px; gap: 12px; }
.task-header {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.task-top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.task-score {
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 4px;
}
.task-streak {
  font-size: 15px;
  font-weight: 700;
  color: #F59E0B;
}
.task-progress-bar {
  width: 100%;
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.task-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.4s ease;
}
.task-timer-bar {
  width: 100%;
  height: 5px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 2px;
}
.task-timer-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1s linear, background-color 1s linear;
  background: var(--correct);
}
.task-character-row {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
}
.task-character-avatar svg { width: 60px; height: 60px; }
.task-character-name {
  font-size: 16px;
  font-weight: 700;
}
.task-instruction {
  font-size: 15px;
  color: var(--text2);
  text-align: left;
  width: 100%;
  line-height: 1.4;
  font-style: italic;
}
.task-body {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  flex: 1;
  justify-content: center;
}
.task-sentence {
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  line-height: 1.4;
  padding: 16px;
  background: var(--card);
  border-radius: var(--radius-lg);
  width: 100%;
  box-shadow: var(--shadow);
}
.task-sentence .blank {
  display: inline-block;
  min-width: 80px;
  border-bottom: 3px dashed var(--accent);
  margin: 0 4px;
  padding: 0 4px;
  color: var(--accent);
}
.task-sentence .highlight {
  font-weight: 800;
  text-decoration: underline;
  text-decoration-color: var(--accent);
  text-underline-offset: 3px;
}
.task-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
}
.task-option-btn {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 18px;
  font-family: var(--font);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  transition: transform 0.15s, border-color 0.2s, background-color 0.3s;
  text-align: left;
  min-height: 44px;
  box-shadow: var(--shadow);
}
.task-option-btn:active { transform: scale(0.97); }
.task-option-btn.correct {
  border-color: var(--correct);
  background-color: #ECFDF5;
}
.task-option-btn.wrong {
  border-color: var(--error);
  background-color: #FEF2F2;
  animation: shake 0.4s ease;
}
.task-option-btn.disabled { pointer-events: none; opacity: 0.7; }

/* Word Ordering */
.word-cards-container {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  width: 100%;
}
.word-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 16px;
  font-family: var(--font);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  min-height: 44px;
  transition: transform 0.15s, border-color 0.2s, background-color 0.2s;
  box-shadow: var(--shadow);
  user-select: none;
}
.word-card:active { transform: scale(0.97); }
.word-card.extra {
  background: #FEF3C7;
  border-color: #FCD34D;
}
.word-card.placed {
  opacity: 0.3;
  pointer-events: none;
}
.word-card.correct { border-color: var(--correct); background: #ECFDF5; }
.word-card.wrong { border-color: var(--error); background: #FEF2F2; }
.sentence-zone {
  width: 100%;
  min-height: 60px;
  border: 2px dashed var(--border);
  border-radius: var(--radius-lg);
  padding: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  justify-content: center;
  margin: 8px 0;
}
.sentence-zone-word {
  background: var(--accent);
  color: #fff;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  min-height: 40px;
  transition: transform 0.15s;
  user-select: none;
}
.sentence-zone-word:active { transform: scale(0.95); }
.sentence-zone-word.correct-word { background: var(--correct); color: var(--text); }
.sentence-zone-word.wrong-word { background: var(--error); }
.btn-check {
  background: var(--accent);
  color: #fff;
  font-size: 16px;
  padding: 12px 36px;
  margin-top: 8px;
  box-shadow: var(--shadow);
}
.btn-check:disabled { opacity: 0.4; pointer-events: none; }

/* Finn helper */
.finn-helper {
  width: 100%;
  background: var(--card);
  border-radius: var(--radius-lg);
  padding: 12px 16px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: flex-start;
  gap: 10px;
  animation: slideUp 0.3s ease;
}
.finn-helper svg { width: 40px; height: 40px; flex-shrink: 0; margin-top: 2px; }
.finn-bubble {
  font-size: 14px;
  font-style: italic;
  color: var(--text);
  line-height: 1.4;
}
.task-hint-btn {
  position: absolute;
  bottom: 16px;
  right: 16px;
  background: var(--card);
  border: 2px solid var(--accent);
  border-radius: 50%;
  width: 44px;
  height: 44px;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: var(--shadow);
  z-index: 10;
}

/* ===== MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(30,27,75,0.5);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card);
  border-radius: var(--radius-lg);
  padding: 24px 20px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  animation: popIn 0.3s ease;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h3 {
  font-size: 18px;
  font-weight: 800;
  text-align: center;
  margin-bottom: 16px;
}
.cheat-section { margin-bottom: 14px; }
.cheat-section-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 6px;
}
.cheat-formula {
  font-size: 15px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 4px;
}
.cheat-examples {
  font-size: 14px;
  color: var(--text2);
  padding-left: 16px;
  line-height: 1.6;
}
.cheat-warn {
  font-size: 14px;
  font-weight: 600;
  color: #EF4444;
  margin-top: 12px;
  padding: 10px;
  background: #FEF2F2;
  border-radius: 8px;
  line-height: 1.5;
}

/* ===== RESULT SCREEN ===== */
#screen-result {
  justify-content: center;
  text-align: center;
  gap: 20px;
  background: linear-gradient(135deg, #E0E7FF, #F5F3FF);
}
.result-icon { animation: bounceIn 0.6s ease; }
.result-title {
  font-size: 24px;
  font-weight: 800;
}
.result-score {
  font-size: 36px;
  font-weight: 800;
  color: var(--accent);
}
.result-costume {
  background: var(--card);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow);
  animation: popIn 0.6s ease;
  max-width: 280px;
  width: 100%;
}
.result-costume-name {
  font-size: 16px;
  font-weight: 700;
  margin-top: 8px;
}
.result-costume-label {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 4px;
}

/* ===== COLLECTION SCREEN ===== */
#screen-collection { padding-top: 30px; gap: 16px; }
.collection-back {
  align-self: flex-start;
  background: none;
  border: none;
  font-size: 15px;
  color: var(--text2);
  cursor: pointer;
  font-family: var(--font);
  font-weight: 600;
}
.collection-title {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
}
.collection-dancer {
  position: relative;
  width: 200px;
  height: 320px;
  margin: 0 auto;
}
.collection-items {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 360px;
}
.collection-item {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  text-align: center;
  box-shadow: var(--shadow);
}
.collection-item.locked { opacity: 0.4; }
.collection-item.unlocked { border-color: var(--accent); }
.collection-item svg { width: 60px; height: 60px; margin: 0 auto 8px; display: block; }
.collection-item-name {
  font-size: 13px;
  font-weight: 600;
}
.collection-item-locked {
  font-size: 12px;
  color: var(--text2);
}

/* ===== FINALE SCREEN ===== */
#screen-finale {
  justify-content: center;
  text-align: center;
  gap: 24px;
  background: linear-gradient(135deg, #1E1B4B, #312E81);
  color: #fff;
  min-height: 100vh;
  overflow: hidden;
}
.finale-curtain {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: linear-gradient(180deg, #7C3AED, #A78BFA);
  z-index: 2;
}
.finale-stage {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  z-index: 3;
}
.finale-characters svg { width: 80px; height: 80px; }
.finale-title {
  font-size: 24px;
  font-weight: 800;
  z-index: 3;
}
.finale-score {
  font-size: 30px;
  font-weight: 800;
  color: var(--streak);
  z-index: 3;
}
.finale-btn {
  background: var(--accent);
  color: #fff;
  font-size: 18px;
  padding: 14px 40px;
  z-index: 3;
}

/* Confetti */
.confetti-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 200;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  animation: confettiFall 3s ease-out forwards;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}
@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(167,139,250,0.25), var(--shadow); }
  50% { box-shadow: 0 0 0 6px rgba(167,139,250,0.15), var(--shadow); }
}
@keyframes bounceIn {
  0% { transform: scale(0); }
  50% { transform: scale(1.15); }
  70% { transform: scale(0.95); }
  100% { transform: scale(1); }
}
@keyframes scorePop {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-30px); }
}
@keyframes confettiFall {
  0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
@keyframes snowfall {
  0% { transform: translateY(-10px) rotate(0deg); opacity: 0.8; }
  100% { transform: translateY(300px) rotate(360deg); opacity: 0; }
}
@keyframes happyWiggle {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(3deg); }
  75% { transform: rotate(-3deg); }
}
.happy-animate { animation: happyWiggle 0.5s ease 2; }

/* ===== RESPONSIVE ===== */
@media (max-width: 360px) {
  html { font-size: 14px; }
  .task-sentence { font-size: 17px; padding: 12px; }
  .task-option-btn { font-size: 14px; padding: 12px 14px; }
  .word-card { font-size: 14px; padding: 8px 12px; }
  .start-characters svg { width: 50px; height: 50px; }
  .map-level-card { padding: 14px; }
  .map-level-name { font-size: 16px; }
}
@media (min-width: 500px) {
  #app { box-shadow: 0 0 40px rgba(167,139,250,0.1); background: var(--bg); }
}
</style>
</head>
<body>
<div id="app">
  <!-- START SCREEN -->
  <div id="screen-start" class="screen active"></div>
  <!-- MAP SCREEN -->
  <div id="screen-map" class="screen"></div>
  <!-- TASK SCREEN -->
  <div id="screen-task" class="screen" style="position:relative;"></div>
  <!-- RESULT SCREEN -->
  <div id="screen-result" class="screen"></div>
  <!-- COLLECTION SCREEN -->
  <div id="screen-collection" class="screen"></div>
  <!-- FINALE SCREEN -->
  <div id="screen-finale" class="screen"></div>
</div>
<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay"></div>
<!-- CONFETTI -->
<div id="confetti-container" class="confetti-container"></div>

<script>
// ==================== SVG CHARACTERS ====================
const SVG = {
  finn: (size=60, state='neutral') => {
    const happyClass = state==='happy' ? ' class="happy-animate"' : '';
    const eyesNeutral = `<circle cx="-6" cy="-10" r="4" fill="white"/><circle cx="6" cy="-10" r="4" fill="white"/><circle cx="-5" cy="-10" r="2" fill="#1E1B4B"/><circle cx="7" cy="-10" r="2" fill="#1E1B4B"/>`;
    const eyesHappy = `<path d="M-10,-10 Q-6,-6 -2,-10" stroke="#1E1B4B" stroke-width="2" fill="none"/><path d="M2,-10 Q6,-6 10,-10" stroke="#1E1B4B" stroke-width="2" fill="none"/>`;
    const eyes = state==='happy' ? eyesHappy : eyesNeutral;
    return `<svg width="${size}" height="${size}" viewBox="-30 -35 60 70"${happyClass}>
      <ellipse cx="0" cy="10" rx="18" ry="22" fill="#1E3A5F"/>
      <ellipse cx="0" cy="14" rx="12" ry="14" fill="white"/>
      <circle cx="0" cy="-12" r="14" fill="#1E3A5F"/>
      <polygon points="-4,0 4,0 0,6" fill="#FB923C"/>
      ${eyes}
      <rect x="-20" y="2" width="8" height="18" rx="4" fill="#1E3A5F"/>
      <rect x="12" y="2" width="8" height="18" rx="4" fill="#1E3A5F"/>

      <div class="map-level-name">${lv.name}</div>

  });

  const unlockedCount = state.collectionItems.length;

  html += `<div class="map-costume-progress">

// ==================== SHUFFLE UTILITY ====================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
let shuffledCorrectIdx = 0;
let shuffledOptions = [];

function shuffleOptions(ex) {
  const indexed = ex.options.map((opt, i) => ({ opt, origIdx: i }));
  const shuffled = shuffle(indexed);
  shuffledOptions = shuffled.map(item => item.opt);
  shuffledCorrectIdx = shuffled.findIndex(item => item.origIdx === ex.correct);
  return shuffled;
}

// ==================== MECHANIC A: MATCHING ====================
function renderMechanicA(ex, isReview=false) {
  const body = document.getElementById('task-body');
  const shuffled = shuffleOptions(ex);
  let html = '<div class="task-options">';
  shuffled.forEach((item, i) => {
    html += `<button class="task-option-btn" data-idx="${i}" onclick="handleA(${i}, ${isReview})">${item.opt}</button>`;
  });
  html += '</div>';
  body.innerHTML = html;
}

function handleA(idx, isReview=false) {
  const ex = currentExercise;
  const btns = document.querySelectorAll('.task-option-btn');
  btns.forEach(b => b.classList.add('disabled'));
  taskAttempts++;
  if (idx === shuffledCorrectIdx) {
    btns[idx].classList.add('correct');
    handleCorrect(ex, isReview);
  } else {
    btns[idx].classList.add('wrong');
    handleWrong(ex, isReview);
    // Allow retry after showing feedback
    setTimeout(() => {
      btns.forEach(b => {
        b.classList.remove('disabled', 'wrong');
      });
      // Don't allow clicking the same wrong answer again
      btns[idx].classList.add('disabled');
    }, 1800);
  }
}

// ==================== MECHANIC B: GAP-FILL ====================
function renderMechanicB(ex, isReview=false) {
  const body = document.getElementById('task-body');
  let sentHtml = '';
  if (ex.sentenceBefore === "___" && !ex.sentenceAfter) {
    sentHtml = `<span class="blank" id="blank-slot"></span>`;
  } else if (ex.sentenceAfter && ex.sentenceBefore) {
    const before = ex.sentenceBefore.replace('___', '<span class="blank" id="blank-slot"></span>');

  } else {
    sentHtml = ex.sentenceBefore.replace('___', '<span class="blank" id="blank-slot"></span>') + (ex.sentenceAfter || '');
  }
  const shuffled = shuffleOptions(ex);
  let html = `<div class="task-sentence">${sentHtml}</div><div class="task-options">`;
  shuffled.forEach((item, i) => {
    html += `<button class="task-option-btn" data-idx="${i}" onclick="handleB(${i}, ${isReview})">${item.opt}</button>`;
  });
  html += '</div>';
  body.innerHTML = html;
}

function handleB(idx, isReview=false) {
  const ex = currentExercise;
  const btns = document.querySelectorAll('.task-option-btn');

function renderMechanicC(ex, isReview=false) {
  const body = document.getElementById('task-body');

  let parts = ex.fullSentence.split(ex.highlight);
  let sentHtml = '';
  if (parts.length === 2) {
    sentHtml = parts[0] + '<span class="highlight">' + ex.highlight + '</span>' + parts[1];

  }
  let html = `<div class="task-sentence">${sentHtml}</div>
    <div class="task-options">
      <button class="task-option-btn" onclick="handleC(true, ${isReview})">✅ Верно</button>
      <button class="task-option-btn" onclick="handleC(false, ${isReview})">❌ Неверно</button>
    </div>`;
  body.innerHTML = html;

function handleC(userSaysCorrect, isReview=false) {
  const ex = currentExercise;
  const btns = document.querySelectorAll('.task-option-btn');
  btns.forEach(b => b.classList.add('disabled'));
  taskAttempts++;
  const actuallyCorrect = ex.isCorrect;
  if (userSaysCorrect === actuallyCorrect) {
    btns[userSaysCorrect ? 0 : 1].classList.add('correct');
    if (!actuallyCorrect && ex.correction) {
      const sentEl = document.querySelector('.task-sentence');
      if (sentEl) {
        setTimeout(() => {
          sentEl.innerHTML = '<span style="color:var(--correct);">' + ex.correction + '</span>';
        }, 500);
      }
      handleCorrect(ex, isReview, ex.finnWrong);
    } else {
      handleCorrect(ex, isReview, ex.finnCorrect || null);
    }
  } else {
    btns[userSaysCorrect ? 0 : 1].classList.add('wrong');
    handleWrong(ex, isReview);
    // Allow retry after showing feedback
    const wrongBtnIdx = userSaysCorrect ? 0 : 1;
    setTimeout(() => {
      btns.forEach(b => {
        b.classList.remove('disabled', 'wrong');
      });
      btns[wrongBtnIdx].classList.add('disabled');
    }, 1800);
  }
}

// ==================== MECHANIC D: WORD ORDERING ====================
let wordOrderState = { placed: [], source: [] };

function renderMechanicD(ex, isReview=false) {
  const body = document.getElementById('task-body');
  const shuffledCards = shuffle(ex.cards);
  wordOrderState = { placed: [], source: shuffledCards };
  let html = `<div class="word-cards-container" id="word-source">`;
  shuffledCards.forEach((w, i) => {
    html += `<button class="word-card" data-word="${w}" data-srcidx="${i}" onclick="placeWord(this)">${w}</button>`;
  });
  html += `</div>
    <div class="sentence-zone" id="sentence-zone"></div>
    <button class="btn btn-check" id="btn-check" onclick="checkWordOrder(${isReview})" disabled>Проверить</button>`;
  body.innerHTML = html;
  updateSentenceZone(ex);
}

function placeWord(btn) {
  const word = btn.dataset.word;
  const srcIdx = parseInt(btn.dataset.srcidx);
  btn.classList.add('placed');
  wordOrderState.placed.push({ word, srcIdx, el: btn });
  updateSentenceZone();
  document.getElementById('btn-check').disabled = false;
}

function unplaceWord(idx) {
  const item = wordOrderState.placed.splice(idx, 1)[0];
  item.el.classList.remove('placed');
  updateSentenceZone();
  if (wordOrderState.placed.length === 0) {
    document.getElementById('btn-check').disabled = true;
  }
}

function updateSentenceZone() {
  const zone = document.getElementById('sentence-zone');
  if (!zone) return;
  zone.innerHTML = wordOrderState.placed.length === 0
    ? '<span style="color:var(--text2);font-size:14px;">Нажимай на слова в правильном порядке</span>'
    : wordOrderState.placed.map((w, i) =>
        `<button class="sentence-zone-word" onclick="unplaceWord(${i})">${w.word}</button>`
      ).join('');
}

function checkWordOrder(isReview=false) {
  const ex = currentExercise;
  const userSentence = wordOrderState.placed.map(w => w.word).join(' ');
  const correctSentence = ex.correctOrder.join(' ');
  const btn = document.getElementById('btn-check');
  btn.disabled = true;
  taskAttempts++;

  const zoneWords = document.querySelectorAll('.sentence-zone-word');
  if (userSentence === correctSentence) {
    zoneWords.forEach(w => w.classList.add('correct-word'));
    handleCorrect(ex, isReview);
  } else {
    // Highlight wrong words
    for (let i = 0; i < zoneWords.length; i++) {
      if (i < ex.correctOrder.length && zoneWords[i].textContent !== ex.correctOrder[i]) {
        zoneWords[i].classList.add('wrong-word');
      }
    }
    handleWrong(ex, isReview);
    // After wrong, allow retry
    setTimeout(() => {
      zoneWords.forEach(w => { w.classList.remove('wrong-word'); });
      // Return all words
      while (wordOrderState.placed.length > 0) unplaceWord(0);
      btn.disabled = false;
    }, 2000);
  }
}

// ==================== CORRECT / WRONG HANDLERS ====================
function handleCorrect(ex, isReview, altPraise=null) {
  let points = 0;
  if (taskAttempts === 1) {
    points = 10;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  } else if (taskAttempts === 2) {
    points = 5;
    state.streak = 0;
  } else {
    points = 2;
    state.streak = 0;
  }
  // Timer bonus for level 3
  if (state.currentLevel === 3 && timerSeconds > 0) {
    points += 5;
  }
  if (!isReview) {
    state.score += points;
    state.totalCorrect++;
    checkCollectionUnlock();
  } else {
    state.totalCorrect++;
    checkCollectionUnlock();
  }
  // Show Finn praise
  const praise = altPraise || CHAR_PRAISE[ex.character][0];
  showFinnHelper(praise, true);
  // Streak milestones
  if (state.streak === 5) {
    setTimeout(() => showFinnHelper('Пять подряд! Ты горишь!', true), 1200);
  }
  if (state.streak === 10) {
    spawnConfetti();
  }
  // Score animation
  showScorePop('+' + points);
  // Make character happy
  const avatar = document.querySelector('.task-character-avatar');
  if (avatar) { avatar.innerHTML = charSVGs[ex.character](60, 'happy'); }
  saveState();
  // Remove from error bank if present
  state.errorBank = state.errorBank.filter(id => id !== ex.id);
  saveState();
  // Next task after delay
  setTimeout(() => {
    if (isReview) {
      renderReviewTask();
    } else {
      state.currentTask++;
      saveState();
      renderTask();
    }
  }, 1500);
}

function handleWrong(ex, isReview=false) {
  state.streak = 0;
  if (!isReview) {
    state.errorBank = [...new Set([...state.errorBank, ex.id])];
    saveState();
  }
  // Show Finn error message
  const level = state.currentLevel;
  let msg = '';
  if (level === 1 || isReview) {
    msg = ex.finnWrong || ENCOURAGE[Math.floor(Math.random()*ENCOURAGE.length)];
  } else if (level === 2) {
    if (taskAttempts === 1) {
      msg = ex.hint1 || ENCOURAGE[Math.floor(Math.random()*ENCOURAGE.length)];
      // Show hint button for level 2
      const hintBtn = document.getElementById('hint-btn');
      if (hintBtn) hintBtn.style.display = 'flex';
    } else {
      msg = ex.hint2 || ex.finnWrong || ENCOURAGE[Math.floor(Math.random()*ENCOURAGE.length)];
    }
  } else {
    msg = ex.finnWrong || (ex.hint2 || ex.correctOrder ? ex.hint2 || ex.correctOrder.join(' ') + '!' : 'Попробуй ещё раз!');
  }
  const charMsg = CHAR_WRONG[ex.character][0];
  showFinnHelper(taskAttempts === 1 ? charMsg : msg, false);
  saveState();
}

// ==================== FINN HELPER ====================
function showFinnHelper(msg, isCorrect) {
  const el = document.getElementById('finn-helper');
  if (!el) return;
  el.style.display = 'flex';
  el.innerHTML = `<div>${SVG.finn(40, isCorrect?'happy':'neutral')}</div>
    <div class="finn-bubble">${msg}</div>`;
  el.className = 'finn-helper';
}

// ==================== SCORE POP ====================
function showScorePop(text) {
  const el = document.createElement('div');
  el.textContent = text;
  el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:800;color:var(--accent);pointer-events:none;z-index:50;animation:scorePop 0.8s ease forwards;';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// ==================== TIMER (LEVEL 3) ====================
function startTimer() {
  timerSeconds = 20;
  const fill = document.getElementById('timer-fill');
  if (!fill) return;
  fill.style.width = '100%';
  fill.style.background = 'var(--correct)';
  timerInterval = setInterval(() => {
    timerSeconds--;
    const pct = (timerSeconds / 20 * 100);
    fill.style.width = pct + '%';
    if (timerSeconds <= 8) {
      fill.style.background = 'var(--streak)';
    }
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      timerSeconds = 0;
    }
  }, 1000);
}

// ==================== COLLECTION CHECK ====================
function checkCollectionUnlock() {
  COLLECTION_ITEMS.forEach(item => {
    if (state.totalCorrect >= item.threshold && !state.collectionItems.includes(item.id)) {
      state.collectionItems.push(item.id);
      showCollectionUnlock(item);
    }
  });
}

function showCollectionUnlock(item) {
  // Overlay
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('active');
  overlay.innerHTML = `<div class="modal" style="text-align:center;">
    <div style="font-size:14px;color:var(--text2);margin-bottom:8px;">Новый элемент костюма!</div>
    <div style="margin:16px auto;">${item.svg}</div>
    <div class="result-costume-name" style="color:${item.color};">${item.emoji} ${item.name}</div>
    <button class="btn btn-primary" style="margin-top:20px;" onclick="closeModal()">Ура!</button>
  </div>`;
  // Snowflakes
  spawnSnowflakes();
}

// ==================== CHEAT SHEET ====================
function showCheatSheet() {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('active');
  overlay.innerHTML = `<div class="modal">
    <h3>📌 Как давать команды</h3>
    <div class="cheat-section">
      <div class="cheat-section-title" style="color:var(--correct)">✅ Сделай это:</div>
      <div class="cheat-formula">[Глагол] + ...</div>
      <div class="cheat-examples">Eat the apple!<br>Sing your song!<br>Take the ball!</div>
    </div>
    <div class="cheat-section">
      <div class="cheat-section-title" style="color:var(--error)">❌ Не делай этого:</div>
      <div class="cheat-formula">Don't + [Глагол] + ...</div>
      <div class="cheat-examples">Don't eat the apple!<br>Don't touch the cat!</div>
    </div>
    <div class="cheat-warn">⚠️ Глагол НЕ меняется:<br>Eat ✅ &nbsp; Eats ❌<br>Don't eat ✅ &nbsp; Don't eats ❌</div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-primary" onclick="closeModal()">Понятно!</button>
    </div>
  </div>`;
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
}

function showHintForLevel2() {
  const level = state.currentLevel;
  const ex = EXERCISES[level][state.currentTask];
  showCheatSheet();
}

// ==================== MODAL ====================
function showModal(title, body, buttons) {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('active');
  let html = `<div class="modal"><h3>${title}</h3>${body}<div style="display:flex;gap:12px;justify-content:center;margin-top:16px;">`;
  buttons.forEach(b => {
    html += `<button class="btn ${b.cls}" onclick="${b.action}()">${b.text}</button>`;
  });
  html += `</div></div>`;
  overlay.innerHTML = html;
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('active');
  overlay.innerHTML = '';
}

// ==================== FINISH LEVEL ====================
function finishLevel() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  const level = state.currentLevel;
  if (!state.completedLevels.includes(level)) {
    state.completedLevels.push(level);
  }
  if (level < 3) {
    state.currentLevel = level + 1;
    state.currentTask = 0;
  }
  saveState();
  renderResult(level);
}

function renderResult(completedLevel) {
  const level = completedLevel;
  const levelNames = { 1: 'Репетиция', 2: 'Прогон', 3: 'Концерт' };
  spawnConfetti();
  let html = `
    <div class="result-icon">${SVG.snowflake(80)}</div>
    <div class="result-title">${levelNames[level]} завершена!</div>
    <div class="result-score">${state.score} очков</div>
    <div style="color:var(--text2);font-size:15px;">Серия: ${state.bestStreak} подряд</div>
    <div style="color:var(--text2);font-size:14px;">Правильных ответов: ${state.totalCorrect}</div>`;
  if (level === 3) {
    html += `<button class="btn btn-primary" style="margin-top:20px;" onclick="showFinale()">Сцена!</button>`;
  } else {
    html += `<button class="btn btn-primary" style="margin-top:20px;" onclick="backToMap()">Дальше</button>`;
  }
  document.getElementById('screen-result').innerHTML = html;
  showScreen('screen-result');
}

function backToMap() {
  showScreen('screen-map');
  renderMap();
}

// ==================== COLLECTION SCREEN ====================
function showCollection() {
  let html = `
    <button class="collection-back" onclick="backToMap()">← Назад</button>
    <div class="collection-title">Коллекция костюма</div>
    <div class="collection-items">`;
  COLLECTION_ITEMS.forEach(item => {
    const unlocked = state.collectionItems.includes(item.id);
    html += `<div class="collection-item ${unlocked?'unlocked':'locked'}">
      <div>${unlocked ? item.svg : '<svg viewBox="0 0 60 60" width="60" height="60"><rect width="60" height="60" rx="12" fill="#E5E7EB"/><text x="30" y="35" text-anchor="middle" font-size="20">🔒</text></svg>'}</div>
      <div class="collection-item-name">${unlocked ? item.emoji+' '+item.name : item.name}</div>
      ${unlocked ? '' : `<div class="collection-item-locked">${item.threshold} правильных ответов</div>`}
    </div>`;
  });
  html += '</div>';
  document.getElementById('screen-collection').innerHTML = html;
  showScreen('screen-collection');
}

// ==================== FINALE SCREEN ====================
function showFinale() {
  spawnConfetti();
  let html = `
    <div class="finale-curtain"></div>
    <div class="finale-title">🎉 Большой Концерт! 🎉</div>
    <div class="finale-stage">
      <div class="finale-characters">${SVG.finn(80,'happy')}</div>
      <div class="finale-characters">${SVG.luna(80,'happy')}</div>
      <div class="finale-characters">${SVG.rico(80,'happy')}</div>
      <div class="finale-characters">${SVG.marcy(80,'happy')}</div>
    </div>
    <div style="z-index:3;font-size:16px;color:#C4B5FD;">Все животные вышли на сцену в полных костюмах!</div>
    <div class="finale-score">${state.score} очков</div>
    <div style="z-index:3;font-size:14px;color:#A78BFA;">Лучшая серия: ${state.bestStreak} подряд</div>
    <div style="z-index:3;font-size:14px;color:#A78BFA;">Костюм собран: ${state.collectionItems.length}/${COLLECTION_ITEMS.length}</div>
    <button class="btn finale-btn" onclick="replayGame()">Сыграть ещё раз</button>
    <button class="btn btn-ghost" style="z-index:3;color:#C4B5FD;" onclick="backToMap()">Карта</button>`;
  document.getElementById('screen-finale').innerHTML = html;
  showScreen('screen-finale');
}

function replayGame() {
  resetState();
  saveState();
  renderStart();
}

// ==================== CONFETTI ====================
function spawnConfetti() {
  const container = document.getElementById('confetti-container');
  const colors = ['#A78BFA','#6EE7B7','#FCD34D','#FCA5A5','#BAE6FD','#F9A8D4'];
  for (let i = 0; i < 30; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDelay = Math.random() * 1 + 's';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}

function spawnSnowflakes() {
  const container = document.getElementById('confetti-container');
  for (let i = 0; i < 15; i++) {
    const flake = document.createElement('div');
    flake.textContent = '❄';
    flake.style.cssText = `position:absolute;left:${Math.random()*100}%;top:-20px;font-size:${12+Math.random()*16}px;animation:snowfall ${2+Math.random()*2}s ease-out forwards;animation-delay:${Math.random()*1.5}s;pointer-events:none;opacity:0.7;`;
    container.appendChild(flake);
    setTimeout(() => flake.remove(), 5000);
  }
}

// ==================== INIT ====================
function init() {
  const hasData = loadState();
  if (!hasData) {
    state = { ...DEFAULT_STATE };
  }
  renderStart();
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

init();
</script>
</body>
</html>
